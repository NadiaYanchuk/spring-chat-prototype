<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
    <script src="https://kit.fontawesome.com/2bce5db7d8.js" crossorigin="anonymous"></script>
    <style>
        body { background: #2b2d35; color: white; }
        .table-dark td, .table-dark th { vertical-align: middle; }
        .btn + .btn { margin-left: 4px; }
        .btn { margin-bottom: 2px; }
    </style>
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Admin Panel</h2>
        <div>
            <button class="btn btn-outline-light mr-2" onclick="loadUsers()">
                <i class="fa fa-refresh"></i> Refresh
            </button>
            <a href="/chat" class="btn btn-secondary">← Back to chat</a>
        </div>
    </div>

    <div id="statsBar" class="mb-3"></div>

    <table class="table table-dark table-striped table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Role</th>
                <th>Registered</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="usersTableBody"></tbody>
    </table>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
<script>
    function loadUsers() {
        $.when(
            $.getJSON('/admin/users'),
            $.getJSON('/getonlineusers')
        ).done(function(usersRes, onlineRes) {
            const users = usersRes[0];
            const onlineSet = new Set(onlineRes[0]);

            const activeCount = users.filter(u => !u.isDeleted).length;
            const onlineCount = users.filter(u => onlineSet.has(u.username)).length;

            $('#statsBar').html(`
                <span class="badge badge-success mr-2" style="font-size:14px">Online: ${onlineCount}</span>
                <span class="badge badge-info mr-2" style="font-size:14px">Active: ${activeCount}</span>
                <span class="badge badge-secondary" style="font-size:14px">Total: ${users.length}</span>
            `);

            let rows = '';
            users.forEach(function(u) {
                const isAdmin = u.role === 'ADMIN';
                const deleted = u.isDeleted;
                const isOnline = onlineSet.has(u.username);
                const banned = !deleted && u.bannedUntil && new Date(u.bannedUntil) > new Date();
                const bannedUntil = banned ? new Date(u.bannedUntil).toLocaleString() : null;
                const joinTime = u.joinTime ? new Date(u.joinTime).toLocaleDateString() : '—';

                rows += `
                    <tr>
                        <td>${u.id}</td>
                        <td>${u.username}</td>
                        <td>${u.email}</td>
                        <td>
                            <span class="badge badge-${isAdmin ? 'warning' : 'info'}">
                                ${u.role}
                            </span>
                        </td>
                        <td>${joinTime}</td>
                        <td>
                            ${deleted
                                ? '<span class="badge badge-danger">Deleted</span>'
                                : banned
                                    ? `<span class="badge badge-warning">Banned until<br>${bannedUntil}</span>`
                                    : isOnline
                                        ? '<span class="badge badge-success">Online</span>'
                                        : '<span class="badge badge-secondary">Offline</span>'}
                        </td>
                        <td>
                            ${!isAdmin && !deleted
                                ? `<button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id})">
                                       <i class="fa fa-trash"></i> Delete
                                   </button>`
                                : ''}
                            ${!isAdmin && deleted
                                ? `<button class="btn btn-success btn-sm" onclick="restoreUser(${u.id})">
                                       <i class="fa fa-undo"></i> Restore
                                   </button>`
                                : ''}
                            ${!isAdmin && !deleted && !banned
                                ? `<button class="btn btn-warning btn-sm" onclick="banUser(${u.id})">
                                       <i class="fa fa-ban"></i> Ban
                                   </button>`
                                : ''}
                            ${!isAdmin && banned
                                ? `<button class="btn btn-info btn-sm" onclick="unbanUser(${u.id})">
                                       <i class="fa fa-unlock"></i> Unban
                                   </button>`
                                : ''}
                            ${!isAdmin && !deleted
                                ? `<button class="btn btn-warning btn-sm" onclick="toggleRole(${u.id}, '${u.role}')">
                                       ${u.role === 'ADMIN' ? 'Demote' : 'Promote'}
                                   </button>`
                                : ''}
                            ${isAdmin ? '—' : ''}
                        </td>
                    </tr>`;
            });
            $('#usersTableBody').html(rows);
        });
    }

    function deleteUser(id) {
        if (!confirm('Delete this user?')) return;
        $.ajax({
            url: '/admin/users/' + id,
            method: 'DELETE',
            success: function() { loadUsers(); },
            error: function(xhr) {
                alert('Error: ' + (xhr.responseJSON?.error || xhr.status));
            }
        });
    }

    function restoreUser(id) {
        if (!confirm('Restore this user?')) return;
        $.ajax({
            url: '/admin/users/' + id + '/restore',
            method: 'PUT',
            success: function() { loadUsers(); },
            error: function(xhr) {
                alert('Error: ' + (xhr.responseJSON?.error || xhr.status));
            }
        });
    }

    function banUser(id) {
        const hours = prompt('Ban for how many hours?', '24');
        if (!hours) return;
        $.ajax({
            url: '/admin/users/' + id + '/ban?hours=' + hours,
            method: 'PUT',
            success: function() { loadUsers(); },
            error: function(xhr) {
                alert('Error: ' + (xhr.responseJSON?.error || xhr.status));
            }
        });
    }

    function unbanUser(id) {
        if (!confirm('Unban this user?')) return;
        $.ajax({
            url: '/admin/users/' + id + '/unban',
            method: 'PUT',
            success: function() { loadUsers(); },
            error: function(xhr) {
                alert('Error: ' + (xhr.responseJSON?.error || xhr.status));
            }
        });
    }

    function toggleRole(id, currentRole) {
        const newRole = currentRole === 'ADMIN' ? 'USER' : 'ADMIN';
        if (!confirm('Change role to ' + newRole + '?')) return;
        $.ajax({
            url: '/admin/users/' + id + '/role?role=' + newRole,
            method: 'PUT',
            success: function() { loadUsers(); },
            error: function(xhr) {
                alert('Error: ' + (xhr.responseJSON?.error || xhr.status));
            }
        });
    }

    loadUsers();
    setInterval(loadUsers, 30000);
</script>
</body>
</html>
